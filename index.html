<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Israel News Radio</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
    text-align: center;
    padding: 20px;
}

h1 {
    margin-bottom: 20px;
}

button {
    display: block;
    width: 90%;
    margin: 10px auto;
    padding: 15px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: #333;
    color: white;
}

button.active {
    background: #00aaff;
}

audio {
    width: 100%;
    margin-top: 20px;
}
</style>
</head>

<body>

<h1>📻 Israel News Radio</h1>
<p id="status">Checking schedule...</p>

<button onclick="playStation('galei')">Galei Israel</button>
<button onclick="playStation('ch14')">C14</button>
<button onclick="playStation('fm103')">103FM</button>
<button onclick="playStation('reshet')">Reshet B</button>

<audio id="player" controls autoplay></audio>

<script>
// 🔊 STREAMS
const stations = {
    galei: "https://galei-israel.streamgates.net/live",
    ch14: "https://radio.streamgates.net/channel14",
    fm103: "https://103fm.streamgates.net/103fm",
    reshet: "https://kanliveicy.media.kan.org.il/icy/kanbet_mp3"
};

let currentStation = null;
let retryCount = 0;
const maxRetries = 10;

// 🕒 SCHEDULE
function getNewsStation(hour, minute) {
    if (minute < 10) return "reshet";
    if (hour >= 7 && hour <= 9) return "galei";
    if (hour >= 12 && hour <= 14) return "fm103";
    if (hour >= 18 && hour <= 20) return "ch14";
    return "reshet";
}

// ▶️ PLAY
function playStation(key) {
    currentStation = key;
    retryCount = 0;

    const player = document.getElementById("player");
    player.src = stations[key];
    player.play().catch(() => {});

    updateUI(key);
}

// 🎨 UI
function updateUI(key) {
    document.querySelectorAll("button").forEach(btn => btn.classList.remove("active"));

    const map = {
        galei: "Galei Israel",
        ch14: "C14",
        fm103: "103FM",
        reshet: "Reshet B"
    };

    document.querySelectorAll("button").forEach(btn => {
        if (btn.innerText === map[key]) {
            btn.classList.add("active");
        }
    });

    document.getElementById("status").innerText = "Playing: " + map[key];
}

// 🔁 AUTO RECONNECT
function setupAutoReconnect() {
    const player = document.getElementById("player");

    player.addEventListener("error", tryReconnect);
    player.addEventListener("stalled", tryReconnect);
    player.addEventListener("waiting", tryReconnect);
}

function tryReconnect() {
    if (!currentStation) return;

    if (retryCount >= maxRetries) {
        document.getElementById("status").innerText = "Connection lost 😢";
        return;
    }

    retryCount++;

    document.getElementById("status").innerText =
        "Reconnecting... (" + retryCount + "/" + maxRetries + ")";

    if (retryCount === 5) {
        document.getElementById("status").innerText =
            "Switching station...";
        autoSelect();
        return;
    }

    setTimeout(() => {
        const player = document.getElementById("player");
        player.src = stations[currentStation];
        player.play().catch(() => {});
    }, 3000);
}

// ⏰ AUTO SELECT
function autoSelect() {
    const now = new Date();
    const hour = now.getHours();
    const minute = now.getMinutes();

    const station = getNewsStation(hour, minute);

    const map = {
        galei: "Galei Israel",
        ch14: "C14",
        fm103: "103FM",
        reshet: "Reshet B"
    };

    document.getElementById("status").innerText =
        "Auto-selected: " + map[station] + " (" + hour + ":" + minute + ")";

    playStation(station);
}

// 🚀 INIT
window.onload = () => {
    setupAutoReconnect();
    autoSelect();
};

setInterval(autoSelect, 300000);
</script>

</body>
</html>
